<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar 記帳本</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="機台圖鑑">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .star-6 {
            color: #f59e0b;
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
        }

        .star-5 {
            color: #eab308;
        }

        .star-4 {
            color: #a3a3a3;
        }

        .star-3 {
            color: #a3a3a3;
        }

        .star-2 {
            color: #a3a3a3;
        }

        .star-sp {
            color: #8b5cf6;
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
        }

        .card-enter {
            animation: cardSlideIn 0.3s ease-out;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer-border {
            background: linear-gradient(90deg, #f87171, #fbbf24, #34d399, #60a5fa, #a78bfa, #f87171);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 flex justify-center font-sans"
    style="background-image:radial-gradient(#cbd5e1 2px,transparent 2px);background-size:30px 30px;">
    <div
        class="w-full max-w-md bg-white shadow-2xl flex flex-col relative min-h-screen overflow-hidden border-x-4 border-slate-800">
        <!-- Header -->
        <header class="bg-red-600 text-white p-4 pt-6 pb-8 relative z-10 shrink-0 border-b-8 border-slate-800">
            <div
                class="absolute -bottom-5 left-1/2 -translate-x-1/2 w-10 h-10 bg-white rounded-full border-8 border-slate-800 z-20">
            </div>
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="pokeball-icon text-white w-[28px] h-[28px]"></div>
                <h1 class="text-2xl font-black tracking-widest text-center" style="text-shadow:2px 2px 0 #1e293b;">
                    Mezastar 記帳本</h1>
            </div>
            <p class="text-red-100 text-sm text-center font-bold">寶可夢圖鑑與花費紀錄</p>
        </header>

        <!-- 統計面板 -->
        <div class="p-4 pt-8 shrink-0 relative z-0">
            <div
                class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-2xl p-4 text-white shadow-[0_4px_0_#0f172a] border-2 border-slate-700">
                <div class="flex justify-between items-center mb-3">
                    <div>
                        <p class="text-slate-300 text-sm mb-1 font-bold">累積花費</p>
                        <div id="total-spent"
                            class="text-3xl font-black text-yellow-400 tracking-wide flex items-center h-9">
                            NT$ 0</div>
                    </div>
                    <div class="text-right">
                        <p class="text-slate-300 text-sm mb-1 font-bold">估計遊玩</p>
                        <div class="text-xl font-black flex items-center justify-end gap-1 text-white h-7">
                            <div class="pokeball-icon text-red-400 w-[20px] h-[20px]"></div><span
                                id="total-plays">0</span> 道
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 pt-3 border-t border-slate-700">
                    <div class="text-center">
                        <p class="text-[10px] text-pink-300 font-bold mb-0.5">👧 姊姊</p>
                        <p id="stat-sister" class="text-sm font-black text-pink-400">$0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-purple-300 font-bold mb-0.5">👧 妹妹</p>
                        <p id="stat-younger" class="text-sm font-black text-purple-400">$0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-orange-300 font-bold mb-0.5">👫 一起</p>
                        <p id="stat-together" class="text-sm font-black text-orange-400">$0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快速新增 -->
        <div class="px-4 mb-4 shrink-0">
            <h2 class="text-sm font-black text-slate-600 mb-3 flex items-center gap-1"><i data-lucide="plus"
                    class="text-red-500 w-[18px] h-[18px]" stroke-width="3"></i> 隨手記一下 (今天)</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="window.快速新增(30)"
                    class="bg-yellow-50 hover:bg-yellow-100 border-2 border-yellow-400 text-yellow-800 py-3 rounded-2xl font-black text-lg flex flex-col items-center justify-center transition-transform active:scale-95 shadow-[0_4px_0_#facc15]"><span
                        class="flex items-center gap-1"><i data-lucide="zap"
                            class="text-yellow-500 fill-yellow-500 w-[18px] h-[18px]"></i> 1 道</span><span
                        class="text-sm font-bold text-yellow-600 mt-1">+30元</span></button>
                <button onclick="window.快速新增(60)"
                    class="bg-red-50 hover:bg-red-100 border-2 border-red-400 text-red-800 py-3 rounded-2xl font-black text-lg flex flex-col items-center justify-center transition-transform active:scale-95 shadow-[0_4px_0_#f87171]"><span
                        class="flex items-center gap-1">
                        <div class="pokeball-icon text-red-500 w-[18px] h-[18px]"></div> 2 道
                    </span><span class="text-sm font-bold text-red-600 mt-1">+60元</span></button>
            </div>
        </div>

        <!-- 紀錄列表 -->
        <div class="flex-1 overflow-y-auto px-4 pb-24">
            <div class="flex justify-between items-end mb-3 mt-2 sticky top-0 bg-white/90 backdrop-blur-sm py-2 z-10">
                <h2 class="text-sm font-black text-slate-600 flex items-center gap-1"><i data-lucide="history"
                        class="text-blue-500 w-[18px] h-[18px]" stroke-width="3"></i> 戰利品圖鑑</h2>
                <button onclick="window.開啟記帳彈窗()" id="btn-custom-add"
                    class="text-red-600 text-sm font-bold flex items-center gap-1 bg-red-100 px-3 py-1.5 rounded-xl hover:bg-red-200 transition-colors shadow-sm"><i
                        data-lucide="plus" class="w-[16px] h-[16px]" stroke-width="3"></i> 新增</button>
            </div>
            <div id="entries-list" class="space-y-4">
                <div class="text-center py-12 text-slate-400 flex flex-col items-center">
                    <div class="pokeball-icon text-slate-200 mb-4 w-[64px] h-[64px]"></div>
                    <p class="font-bold text-slate-500 text-lg">圖鑑空空如也！</p>
                    <p class="text-sm mt-1 font-medium">去尋找傳說中的寶可夢吧！</p>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast"
            class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-medium z-50 whitespace-nowrap animate-bounce hidden transition-opacity">
        </div>

        <!-- 記帳彈窗 -->
        <div id="modal"
            class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
            <div
                class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl border-4 border-slate-800 flex flex-col max-h-[90vh]">
                <div
                    class="bg-red-600 p-4 border-b-4 border-slate-800 flex justify-between items-center text-white shrink-0">
                    <h3 class="font-black text-lg flex items-center gap-2">
                        <div class="pokeball-icon w-[20px] h-[20px]"></div><span id="modal-title">登錄戰利品</span>
                    </h3>
                    <button onclick="window.關閉記帳彈窗()"
                        class="text-red-200 hover:text-white transition-colors bg-red-700 p-1 rounded-full"><i
                            data-lucide="x" class="w-[20px] h-[20px]" stroke-width="3"></i></button>
                </div>
                <div class="p-5 space-y-4 bg-slate-50 overflow-y-auto">
                    <!-- 玩家 -->
                    <div><label class="block text-sm font-black text-slate-700 mb-2">🎮 是誰玩的？</label>
                        <div class="flex gap-2" id="player-buttons">
                            <button onclick="window.設定玩家('姊姊')" data-player="姊姊"
                                class="player-btn flex-1 py-2.5 rounded-xl font-black text-sm transition-all border-2 bg-white border-slate-200 text-slate-500">姊姊</button>
                            <button onclick="window.設定玩家('妹妹')" data-player="妹妹"
                                class="player-btn flex-1 py-2.5 rounded-xl font-black text-sm transition-all border-2 bg-white border-slate-200 text-slate-500">妹妹</button>
                            <button onclick="window.設定玩家('一起')" data-player="一起"
                                class="player-btn flex-1 py-2.5 rounded-xl font-black text-sm transition-all border-2 bg-orange-500 border-orange-600 text-white shadow-inner">一起</button>
                        </div>
                    </div>
                    <!-- 卡片資訊區 -->
                    <div class="bg-white p-3 rounded-2xl border-2 border-slate-200 shadow-sm space-y-3">
                        <p class="text-xs font-bold text-slate-400 flex items-center gap-1"><i data-lucide="credit-card"
                                class="w-3 h-3"></i> 卡片資訊（選填）</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">卡片代號</label>
                                <input type="text" id="input-cardId" placeholder="1-1-001"
                                    class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 font-mono font-bold focus:outline-none focus:border-red-400 bg-slate-50 uppercase" />
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">卡片名稱</label>
                                <input type="text" id="input-cardName" placeholder="皮卡丘"
                                    class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-red-400 bg-white" />
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">星級</label>
                                <select id="input-stars"
                                    class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-red-400 bg-white font-bold">
                                    <option value="0">-- 不選 --</option>
                                    <option value="6">⭐×6 Super Star</option>
                                    <option value="5">⭐×5 Star</option>
                                    <option value="4">⭐×4 一般卡</option>
                                    <option value="3">⭐×3 一般卡</option>
                                    <option value="2">⭐×2 一般卡</option>
                                    <option value="sp">💎 特別 Special</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">圖片網址</label>
                                <input type="url" id="input-imageUrl" placeholder="貼上圖片 URL"
                                    class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-red-400 bg-white" />
                            </div>
                        </div>
                        <!-- 即時預覽 -->
                        <div id="card-preview"
                            class="hidden p-2 bg-gradient-to-r from-slate-800 to-slate-700 rounded-xl items-center gap-3">
                        </div>
                    </div>
                    <!-- 日期 & 金額 -->
                    <div class="flex gap-3">
                        <div class="flex-1"><label
                                class="block text-sm font-black text-slate-700 mb-1 flex items-center gap-1"><i
                                    data-lucide="calendar" class="w-[14px] h-[14px]"></i> 日期</label><input type="date"
                                id="input-date"
                                class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-slate-700 focus:outline-none focus:border-red-400 bg-white" />
                        </div>
                        <div class="flex-1"><label
                                class="block text-sm font-black text-slate-700 mb-1 flex items-center gap-1"><i
                                    data-lucide="dollar-sign" class="w-[14px] h-[14px]"></i> 金額</label><input
                                type="number" id="input-amount"
                                class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-slate-700 focus:outline-none focus:border-red-400 bg-white font-bold" />
                        </div>
                    </div>
                    <!-- 地點 -->
                    <div>
                        <label
                            class="block text-sm font-black text-slate-700 mb-1 flex items-center justify-between"><span
                                class="flex items-center gap-1"><i data-lucide="map-pin" class="w-[14px] h-[14px]"></i>
                                地點</span>
                            <button onclick="window.取得定位()" id="btn-location"
                                class="text-xs flex items-center gap-1 bg-blue-100 text-blue-700 px-2.5 py-1 rounded-lg hover:bg-blue-200 active:bg-blue-300 transition-colors font-bold disabled:opacity-50"><i
                                    data-lucide="locate-fixed" id="icon-location" class="w-[12px] h-[12px]"></i><span
                                    id="text-location">自動定位</span></button>
                        </label>
                        <input type="text" id="input-location" placeholder="例：新光三越、遠百 B1"
                            class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-slate-700 focus:outline-none focus:border-red-400 bg-white" />
                    </div>
                    <!-- 備註 -->
                    <div><label class="block text-sm font-black text-slate-700 mb-1 flex items-center gap-1"><i
                                data-lucide="edit-2" class="w-[14px] h-[14px]"></i> 備註手札</label><textarea
                            id="input-note" placeholder="記錄一下當時開心的心情吧！"
                            class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-slate-700 h-20 resize-none focus:outline-none focus:border-red-400 bg-white"></textarea>
                    </div>
                    <!-- 儲存按鈕 -->
                    <button onclick="window.儲存紀錄()"
                        class="w-full bg-red-600 hover:bg-red-500 text-white font-black text-lg py-3.5 rounded-2xl transition-transform active:scale-95 shadow-[0_4px_0_#991b1b] flex justify-center items-center gap-2 mt-2 border-2 border-red-800">
                        <div class="pokeball-icon w-[20px] h-[20px]"></div> 登錄到圖鑑！
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==== 常數與工具 ====
        const K_紀錄 = 'mezastar_entries';
        const 取得今天 = () => new Date().toISOString().split('T')[0];
        const 寶貝球SVG = `<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M2 12h7"/><path d="M15 12h7"/></svg>`;

        function 渲染寶貝球() { document.querySelectorAll('.pokeball-icon').forEach(el => { el.innerHTML = 寶貝球SVG; }); }
        function 重整圖示() { if (typeof lucide !== 'undefined') lucide.createIcons(); 渲染寶貝球(); }

        // ==== 星級渲染 ====
        function 取得星級顯示(stars) {
            if (!stars || stars === '0') return '';
            if (stars === 'sp') return '<span class="star-sp font-black text-xs">💎 Special</span>';
            const n = Number(stars);
            const cls = n >= 6 ? 'star-6' : n >= 5 ? 'star-5' : 'star-4';
            return `<span class="${cls}">${'⭐'.repeat(n)}</span>`;
        }
        function 取得星級文字(stars) {
            if (!stars || stars === '0') return '';
            if (stars === 'sp') return '💎 Special';
            return '⭐'.repeat(Number(stars));
        }
        function 取得星級小圖(stars) {
            if (!stars || stars === '0') return '';
            if (stars === 'sp') return `<span class="inline-flex items-center gap-0.5 star-sp"><i data-lucide="diamond" class="w-[10px] h-[10px] fill-violet-400 text-violet-400"></i><span class="text-[10px] font-black">SP</span></span>`;
            const n = Number(stars);
            const cls = n >= 6 ? 'fill-yellow-500 text-yellow-500' : n >= 5 ? 'fill-yellow-400 text-yellow-400' : 'fill-slate-400 text-slate-400';
            return Array(n).fill(`<i data-lucide="star" class="w-[10px] h-[10px] ${cls}"></i>`).join('');
        }

        // ==== 應用程式狀態 ====
        let 紀錄清單 = [];
        let 編輯ID = null;
        let 提示計時器 = null;
        let 表單 = { date: 取得今天(), amount: 30, note: '', location: '', player: '一起', cardId: '', cardName: '', stars: '0', imageUrl: '' };

        function 顯示提示(msg) {
            const t = document.getElementById('toast'); t.textContent = msg;
            t.classList.remove('hidden'); t.classList.add('flex');
            if (提示計時器) clearTimeout(提示計時器);
            提示計時器 = setTimeout(() => { t.classList.add('hidden'); t.classList.remove('flex'); }, 2500);
        }

        // ==== 統計面板 ====
        function 更新統計() {
            const 總 = 紀錄清單.reduce((s, e) => s + Number(e.amount), 0);
            document.getElementById('total-spent').textContent = `NT$ ${總.toLocaleString()}`;
            document.getElementById('total-plays').textContent = Math.floor(總 / 30);

            const 姊 = 紀錄清單.filter(e => e.player === '姊姊').reduce((s, e) => s + Number(e.amount), 0);
            const 妹 = 紀錄清單.filter(e => e.player === '妹妹').reduce((s, e) => s + Number(e.amount), 0);
            const 共 = 紀錄清單.filter(e => e.player === '一起').reduce((s, e) => s + Number(e.amount), 0);
            document.getElementById('stat-sister').textContent = `$${姊.toLocaleString()}`;
            document.getElementById('stat-younger').textContent = `$${妹.toLocaleString()}`;
            document.getElementById('stat-together').textContent = `$${共.toLocaleString()}`;
        }

        // ==== 主畫面 ====
        function 更新主畫面() { 更新統計(); 渲染紀錄清單(); 重整圖示(); }

        function 渲染紀錄清單() {
            const el = document.getElementById('entries-list');
            if (紀錄清單.length === 0) {
                el.innerHTML = `<div class="text-center py-12 text-slate-400 flex flex-col items-center"><div class="pokeball-icon text-slate-200 mb-4 w-[64px] h-[64px]"></div><p class="font-bold text-slate-500 text-lg">圖鑑空空如也！</p><p class="text-sm mt-1 font-medium">去尋找傳說中的寶可夢吧！</p></div>`;
                return;
            }
            const sorted = [...紀錄清單].sort((a, b) => {
                const d = new Date(b.date) - new Date(a.date);
                return d !== 0 ? d : (b.createdAt || 0) - (a.createdAt || 0);
            });
            el.innerHTML = sorted.map(entry => {
                const safe = JSON.stringify(entry).replace(/"/g, '&quot;');
                // 玩家樣式
                let ps = '', pi = '';
                if (entry.player === '姊姊') { ps = 'bg-pink-100 border-pink-300 text-pink-600'; pi = '<i data-lucide="user" class="w-[20px] h-[20px]"></i>'; }
                else if (entry.player === '妹妹') { ps = 'bg-purple-100 border-purple-300 text-purple-600'; pi = '<i data-lucide="user" class="w-[20px] h-[20px]"></i>'; }
                else { ps = 'bg-orange-100 border-orange-300 text-orange-600'; pi = '<i data-lucide="users" class="w-[20px] h-[20px]"></i>'; }

                // 卡片區塊
                let ch = '';
                const hasCard = entry.cardName || entry.cardId || entry.imageUrl;
                if (hasCard) {
                    const 名稱 = entry.cardName || entry.cardId || '未知寶可夢';
                    const 星 = 取得星級小圖(entry.stars);
                    const imgHtml = entry.imageUrl
                        ? `<img src="${entry.imageUrl}" alt="${名稱}" class="w-full h-full object-contain drop-shadow-md" onerror="this.parentNode.innerHTML='<div class=\\'pokeball-icon w-full h-full text-yellow-400\\'></div>';渲染寶貝球();"/>`
                        : `<div class="pokeball-icon w-full h-full text-yellow-400"></div>`;
                    ch = `<div class="w-12 h-12 bg-gradient-to-br from-yellow-100 to-amber-200 rounded-lg p-1 shrink-0 border border-yellow-300 shadow-sm">${imgHtml}</div>
                    <div class="flex-1 min-w-0"><div class="flex items-center gap-1"><span class="font-black text-slate-800 truncate">${名稱}</span><div class="flex">${星}</div></div>
                    ${entry.cardId ? `<div class="text-xs font-bold text-slate-400 font-mono mt-0.5">${entry.cardId}</div>` : ''}</div>`;
                } else {
                    ch = `<div class="flex-1 py-2 px-1"><p class="text-slate-400 text-sm italic flex items-center gap-1 font-medium"><i data-lucide="plus" class="w-[14px] h-[14px]"></i> 未登錄卡牌資訊</p></div>`;
                }

                return `<div class="bg-white border-2 border-slate-200 p-3 rounded-2xl shadow-sm flex flex-col gap-2 relative group hover:border-red-300 transition-colors card-enter">
                    <div class="flex justify-between items-start"><div class="flex items-center gap-2 flex-wrap"><div class="bg-slate-800 text-white text-xs font-bold px-2 py-1 rounded-lg flex items-center gap-1"><i data-lucide="calendar" class="w-[12px] h-[12px]"></i> ${entry.date}</div>${entry.location ? `<div class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-lg flex items-center gap-1 max-w-[120px] truncate"><i data-lucide="map-pin" class="w-[12px] h-[12px] shrink-0"></i><span class="truncate">${entry.location}</span></div>` : ''}</div><div class="font-black text-xl text-slate-700 ml-2">$${entry.amount}</div></div>
                    <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl mt-1 border border-slate-100">
                        <div class="flex flex-col items-center justify-center w-12 h-12 rounded-full shrink-0 border-2 shadow-sm ${ps}">${pi}<span class="text-[10px] font-black mt-0.5">${entry.player || '一起'}</span></div>
                        <div class="flex-1 flex items-center gap-2 overflow-hidden cursor-pointer" onclick="window.開啟記帳彈窗J('${safe}')">${ch}</div>
                        <div class="flex flex-col gap-1 shrink-0"><button onclick="window.開啟記帳彈窗J('${safe}')" class="p-1.5 text-blue-500 hover:bg-blue-100 rounded-lg"><i data-lucide="edit-2" class="w-[16px] h-[16px]"></i></button><button onclick="window.確認刪除('${entry.id}')" class="p-1.5 text-red-400 hover:bg-red-100 rounded-lg"><i data-lucide="trash-2" class="w-[16px] h-[16px]"></i></button></div>
                    </div>${entry.note ? `<p class="text-slate-600 text-sm font-bold bg-white px-2 py-1 mt-1 rounded-md border border-slate-100">"${entry.note}"</p>` : ''}
                </div>`;
            }).join('');
        }

        // ==== 記帳彈窗 ====
        function 渲染玩家按鈕() {
            document.querySelectorAll('.player-btn').forEach(btn => {
                const p = btn.dataset.player, a = 表單.player === p;
                const c = p === '姊姊' ? 'bg-pink-500 border-pink-600' : p === '妹妹' ? 'bg-purple-500 border-purple-600' : 'bg-orange-500 border-orange-600';
                btn.className = `player-btn flex-1 py-2.5 rounded-xl font-black text-sm transition-all border-2 ${a ? c + ' text-white shadow-inner' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 shadow-sm'}`;
            });
        }
        window.設定玩家 = (p) => { 表單.player = p; 渲染玩家按鈕(); };

        // 卡片即時預覽
        function 更新卡片預覽() {
            const name = document.getElementById('input-cardName').value.trim();
            const cardId = document.getElementById('input-cardId').value.trim();
            const stars = document.getElementById('input-stars').value;
            const imageUrl = document.getElementById('input-imageUrl').value.trim();
            const preview = document.getElementById('card-preview');

            if (!name && !cardId && !imageUrl) { preview.classList.add('hidden'); preview.classList.remove('flex'); return; }
            preview.classList.remove('hidden'); preview.classList.add('flex');

            const displayName = name || cardId || '預覽';
            const 星 = 取得星級小圖(stars);
            const imgHtml = imageUrl
                ? `<img src="${imageUrl}" alt="${displayName}" class="w-full h-full object-contain drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] relative z-10" onerror="this.parentNode.innerHTML='<div class=\\'pokeball-icon w-full h-full text-yellow-100\\'></div>';渲染寶貝球();"/>`
                : `<div class="pokeball-icon w-full h-full text-yellow-100"></div>`;
            preview.innerHTML = `<div class="w-14 h-14 bg-gradient-to-br from-yellow-200 to-yellow-500 rounded-lg p-1 border-2 border-yellow-300 relative overflow-hidden">${imgHtml}</div>
                <div class="flex-1 text-white"><div class="font-black text-lg tracking-wide">${displayName}</div><div class="flex text-yellow-400 mt-0.5">${星}</div>${cardId ? `<div class="text-xs text-slate-300 font-mono mt-0.5">${cardId.toUpperCase()}</div>` : ''}</div>`;
            重整圖示();
        }

        window.開啟記帳彈窗J = (s) => { try { window.開啟記帳彈窗(JSON.parse(s)); } catch (e) { console.error(e); } };

        window.開啟記帳彈窗 = (entry = null) => {
            if (entry) {
                編輯ID = entry.id;
                document.getElementById('modal-title').textContent = '編輯戰利品';
                表單 = { date: entry.date, amount: entry.amount, note: entry.note || '', location: entry.location || '', player: entry.player || '一起', cardId: entry.cardId || '', cardName: entry.cardName || '', stars: entry.stars || '0', imageUrl: entry.imageUrl || '' };
            } else {
                編輯ID = null;
                document.getElementById('modal-title').textContent = '登錄戰利品';
                表單 = { date: 取得今天(), amount: 30, note: '', location: '', player: '一起', cardId: '', cardName: '', stars: '0', imageUrl: '' };
            }
            document.getElementById('input-date').value = 表單.date;
            document.getElementById('input-amount').value = 表單.amount;
            document.getElementById('input-location').value = 表單.location;
            document.getElementById('input-note').value = 表單.note;
            document.getElementById('input-cardId').value = 表單.cardId;
            document.getElementById('input-cardName').value = 表單.cardName;
            document.getElementById('input-stars').value = 表單.stars;
            document.getElementById('input-imageUrl').value = 表單.imageUrl;
            渲染玩家按鈕(); 更新卡片預覽();
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        };

        window.關閉記帳彈窗 = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        };

        window.取得定位 = () => {
            if (!navigator.geolocation) return 顯示提示('裝置不支援定位');
            const btn = document.getElementById('btn-location'), txt = document.getElementById('text-location');
            btn.disabled = true; txt.textContent = '定位中...';
            document.getElementById('icon-location').outerHTML = '<i data-lucide="loader-2" id="icon-location" class="w-[12px] h-[12px] animate-spin"></i>'; 重整圖示();
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                    const d = await r.json();
                    const n = d.name || d.address?.amenity || d.address?.shop || d.address?.building || d.address?.road || '未知地點';
                    document.getElementById('input-location').value = n; 表單.location = n; 顯示提示('已取得位置！');
                } catch { const f = `${lat.toFixed(4)}, ${lon.toFixed(4)}`; document.getElementById('input-location').value = f; 表單.location = f; }
                重置();
            }, () => { 顯示提示('無法取得定位'); 重置(); }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            function 重置() { btn.disabled = false; txt.textContent = '自動定位'; document.getElementById('icon-location').outerHTML = '<i data-lucide="locate-fixed" id="icon-location" class="w-[12px] h-[12px]"></i>'; 重整圖示(); }
        };

        // ==== 紀錄增刪改 ====
        function 存到本地(新) { 紀錄清單 = 新; localStorage.setItem(K_紀錄, JSON.stringify(紀錄清單)); 更新主畫面(); }

        window.儲存紀錄 = () => {
            表單.date = document.getElementById('input-date').value;
            表單.amount = Number(document.getElementById('input-amount').value);
            表單.location = document.getElementById('input-location').value;
            表單.note = document.getElementById('input-note').value;
            表單.cardId = document.getElementById('input-cardId').value.toUpperCase().trim();
            表單.cardName = document.getElementById('input-cardName').value.trim();
            表單.stars = document.getElementById('input-stars').value;
            表單.imageUrl = document.getElementById('input-imageUrl').value.trim();

            if (!表單.amount || 表單.amount <= 0) return 顯示提示('請輸入有效金額');

            if (編輯ID) {
                存到本地(紀錄清單.map(e => e.id === 編輯ID ? { ...表單, id: 編輯ID, createdAt: e.createdAt } : e));
                顯示提示('紀錄已更新！');
            } else {
                存到本地([...紀錄清單, { ...表單, id: Date.now().toString(), createdAt: Date.now() }]);
                顯示提示('已新增一筆紀錄！');
            }
            window.關閉記帳彈窗();
        };

        window.快速新增 = (amount) => {
            存到本地([...紀錄清單, { id: Date.now().toString(), date: 取得今天(), amount, note: '', location: '', player: '一起', cardId: '', cardName: '', stars: '0', imageUrl: '', createdAt: Date.now() }]);
            顯示提示(`已記錄 ${amount} 元！`);
        };

        window.確認刪除 = (id) => {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                存到本地(紀錄清單.filter(e => e.id !== id));
                顯示提示('紀錄已刪除');
            }
        };

        // ==== 事件綁定 ====
        document.addEventListener('DOMContentLoaded', () => {
            // 即時預覽
            ['input-cardId', 'input-cardName', 'input-stars', 'input-imageUrl'].forEach(id => {
                document.getElementById(id).addEventListener('input', 更新卡片預覽);
                document.getElementById(id).addEventListener('change', 更新卡片預覽);
            });
            // 啟動
            try { 紀錄清單 = JSON.parse(localStorage.getItem(K_紀錄) || '[]'); } catch { 紀錄清單 = []; }
            更新主畫面();
        });
    </script>
</body>

</html>
